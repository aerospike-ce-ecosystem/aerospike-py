services:
  aerospike:
    image: aerospike:ce-8.1.0.3_1
    container_name: aerospike
    ports:
      - "127.0.0.1:18710:3000"
      - "127.0.0.1:18711:3001"
      - "127.0.0.1:18712:3002"
    shm_size: 1g
    environment:
      NAMESPACE: test
      CLUSTER_NAME: docker
      DEFAULT_TTL: "2592000"
      ACCESS_PORT: "18710"
    volumes:
      - ./scripts/aerospike.template.conf:/etc/aerospike/aerospike.template.conf
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: jaeger
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
      - "127.0.0.1:4317:4317"     # OTLP gRPC
      - "127.0.0.1:4318:4318"     # OTLP HTTP
    cpus: 1
    mem_limit: 512m
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
