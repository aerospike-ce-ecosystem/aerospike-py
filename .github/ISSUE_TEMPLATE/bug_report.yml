name: Bug Report
description: Report a bug in aerospike-py
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Install aerospike-py ...
        2. Create a client ...
        3. Call method ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages/tracebacks)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: aerospike-py Version
      description: "Output of `pip show aerospike-py | grep Version`"
      placeholder: "0.0.1.beta2"
    validations:
      required: true
  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
        - "3.14t (free-threaded)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - "macOS (arm64)"
        - "macOS (x86_64)"
        - "Linux (x86_64)"
        - "Linux (aarch64)"
        - "Windows"
    validations:
      required: true
  - type: input
    id: aerospike-version
    attributes:
      label: Aerospike Server Version
      placeholder: "7.2"
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
