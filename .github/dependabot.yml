version: 2
updates:
  - package-ecosystem: cargo
    directory: "/rust"
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/docs"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
