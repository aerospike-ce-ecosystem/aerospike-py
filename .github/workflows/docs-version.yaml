name: Freeze Docs Version
# On GitHub Release: snapshots the current docs for the release version using Docusaurus docs:version

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.0.3)'
        required: true

permissions:
  contents: write
  # actions: write is required for the trailing "Trigger docs publish" step
  # which dispatches the Publish Docs workflow via `gh workflow run`.
  # Without this, dispatch returns HTTP 403:
  # "Resource not accessible by integration".
  actions: write

concurrency:
  group: docs-version
  cancel-in-progress: false

jobs:
  freeze:
    name: Freeze docs for ${{ github.event.release.tag_name || github.event.inputs.tag }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
    # Only process tags starting with v (including pre-releases)
    if: startsWith(github.event.release.tag_name || github.event.inputs.tag, 'v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          # Push directly to main using GITHUB_TOKEN.
          # If branch protection is enabled on main,
          # register a PAT or GitHub App token as a separate Secret and replace the token below.
          # Example: token: ${{ secrets.DOCS_PUSH_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Freezing docs for version: $VERSION"

      - name: Check if version already exists
        id: check
        working-directory: docs
        run: |
          if [ -d "versioned_docs/version-${{ steps.version.outputs.version }}" ]; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Version ${{ steps.version.outputs.version }} already frozen. Skipping."
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Freeze docs with docusaurus docs:version
        if: steps.check.outputs.already_exists == 'false'
        working-directory: docs
        run: npx docusaurus docs:version ${{ steps.version.outputs.version }}

      - name: Update versions-config.json
        if: steps.check.outputs.already_exists == 'false'
        run: node docs/scripts/update-version-config.mjs ${{ steps.version.outputs.version }}

      - name: Commit and push versioned docs
        if: steps.check.outputs.already_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            docs/versioned_docs \
            docs/versioned_sidebars \
            docs/versions.json \
            docs/versions-config.json
          git commit -m "docs: freeze version ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Trigger docs publish
        if: steps.check.outputs.already_exists == 'false'
        run: gh workflow run "Publish Docs" --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
