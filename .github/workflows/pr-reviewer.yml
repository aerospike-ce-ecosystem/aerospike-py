name: PR Reviewer

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    if: github.event.label.name == 'needs-review'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ vars.CLAUDE_REVIEW_TIMEOUT }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run Claude Code - PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          bot_id: '${{ vars.CLAUDE_BOT_ID }}'
          bot_name: '${{ vars.CLAUDE_BOT_NAME }}'
          allowed_bots: '${{ vars.CLAUDE_ALLOWED_BOTS }}'
          branch_prefix: ''
          prompt: |
            You are an AI code review agent for the **aerospike-py** project.

            ## Project Context
            - **Structure**: Rust native module (`rust/src/`) with PyO3 bindings, Python package (`src/aerospike_py/`) with type stubs (`.pyi`)
            - **Build**: maturin + uv, Conventional Commits format
            - **Key patterns**: Sync + Async API pairs, policy-based configuration, CDT operations, Expression filters

            ## Task
            Review PR #${{ github.event.pull_request.number }} and auto-fix HIGH severity issues.

            ### Review Loop (max ${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }} iterations)

            For each iteration (up to ${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }}):

            **1. Analyze Changes**
            - Run `gh pr diff ${{ github.event.pull_request.number }}` to read the diff
            - Categorize issues by severity:
              - **HIGH**: Bugs, security vulnerabilities, data loss risks, breaking API changes, compilation errors, memory safety issues in Rust, incorrect PyO3 bindings
              - **MEDIUM**: Missing error handling, incomplete tests, style inconsistencies, missing `.pyi` stub updates, sync/async mismatch
              - **LOW**: Naming suggestions, documentation improvements
              - **INFO**: Observations, positive feedback

            **2. Decision**
            - If HIGH or MEDIUM issues exist and iteration < ${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }}:
              - Fix all HIGH and MEDIUM issues by editing the affected files
              - Commit: `git add -A && git commit -m "fix(review): <description>"`
              - Push: `git push`
              - Comment: `gh pr comment ${{ github.event.pull_request.number }} --body "🔄 Review iteration N/${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }}: Fixed M HIGH + MEDIUM severity issue(s). Re-reviewing..."`
              - Re-read the diff and continue to next iteration
            - If no HIGH/MEDIUM issues OR iteration limit reached:
              - Break the loop

            **3. Post Final Review**
            Post a summary comment:
            ```
            gh pr comment ${{ github.event.pull_request.number }} --body "$(cat <<'REVIEW'
            ## 📋 PR Review Summary

            **Status**: ✅ APPROVED / ⚠️ CHANGES_REQUESTED
            **Review iterations**: N/${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }}
            **Issues found**: X HIGH, Y MEDIUM, Z LOW

            ### HIGH Severity (auto-fixed)
            - [x] Description of issue and fix

            ### MEDIUM Severity (auto-fixed)
            - [x] Description of issue and fix

            ### LOW Severity
            - Suggestions

            ---
            @kimsoungryoul — Review complete. Human review requested.
            REVIEW
            )"
            ```

            **4. Add Label**
            ```
            gh pr edit ${{ github.event.pull_request.number }} --add-label "review-complete"
            ```

            ## Constraints
            - Maximum ${{ vars.CLAUDE_REVIEW_MAX_ITERATIONS }} review iterations
            - Auto-fix HIGH and MEDIUM severity issues
            - Leave LOW as suggestions only
            - Always mention @kimsoungryoul in the final comment
          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS }}
            --model ${{ vars.CLAUDE_MODEL }}
            --dangerously-skip-permissions
          settings: '${{ vars.CLAUDE_SETTINGS }}'
