# tokei - code line count analysis configuration
#
# Pure implementation code only (default):
#   tokei
#   → tests/, examples/ are auto-excluded via .tokeignore
#
# Including tests + samples:
#   tokei src rust/src tests examples
#   → All meaningful source (excludes docs, node_modules, etc.)

# Terminal output width (columns)
columns = 100
# Sort by language: "lines" | "code" | "comments" | "blanks"
sort = "lines"
# Whether to count Python docstrings as comments (false = count as code)
treat_doc_strings_as_comments = false
# Only count Python and Rust
types = ["Python", "Rust"]
